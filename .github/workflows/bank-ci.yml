name: BankSystem CI Automation

on:
  push:
    branches: [ master ] # Chú ý: Dùng master theo đúng tên nhánh của em
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    permissions:
      contents: read
      pull-requests: write # Quyền này để Bot có thể viết bình luận vào PR

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with JaCoCo
        run: mvn clean verify

      - name: Checkstyle Review
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # Dùng GITHUB_TOKEN viết hoa
          level: warning