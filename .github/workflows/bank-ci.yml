on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ] # Trigger khi có Pull Request vào nhánh main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Cần cấp quyền viết bình luận cho con Bot
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with JaCoCo
        run: mvn clean verify

      - name: Upload JaCoCo Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: JaCoCo-Coverage-Report
          path: target/site/jacoco/

      - name: Checkstyle Review
          uses: dbelyaev/action-checkstyle@master
          with:
            github_token: ${{ secrets.github_token }}
            level: warning